<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kỷ niệm 5 năm 💖</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:#fff;
    text-align:center;
}

.container{
    padding:30px 15px;
    max-width:900px;
    margin:auto;
}

h1{
    font-size:32px;
    margin-bottom:20px;
}

.heart{
    font-size:50px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1)}
    50%{transform:scale(1.2)}
    100%{transform:scale(1)}
}

.card{
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    backdrop-filter: blur(10px);
    text-align:left;
    line-height:1.7;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-top:30px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    object-fit:cover;
    height:120px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.1);
}

.time{
    margin-top:25px;
    font-size:18px;
    font-weight:bold;
}

/* 🎵 Nút nhạc */
.music-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:black;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- 🎵 NHẠC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">🎵 Nhạc</button>

<div class="container">

<div class="heart">❤️</div>
<h1>Hành trình 5 năm – một tình yêu học cách ở lại</h1>

<div class="card">
<p>
(HIỂN THỊ NỘI DUNG CỦA BẠN Ở ĐÂY — giữ nguyên đoạn dài bạn đã viết)
</p>
</div>

<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">
<img src="img6.jpg">
<img src="img7.jpg">
<img src="img8.jpg">
<img src="img9.jpg">
<img src="img10.jpg">
<img src="img11.jpg">
<img src="img12.jpg">
<img src="img13.jpg">
<img src="img14.jpg">
<img src="img15.jpg">
<img src="img16.jpg">
<img src="img17.jpg">
<img src="img18.jpg">
<img src="img19.jpg">
<img src="img20.jpg">
</div>

<div class="time" id="loveTime"></div>

</div>

<script>
const startDate = new Date("2021-05-09");

function updateTime(){
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("loveTime").innerHTML =
        "Đã bên nhau: " + days + " ngày " +
        hours + " giờ " +
        minutes + " phút 💕";
}

setInterval(updateTime,1000);
updateTime();

/* 🎵 PLAY NHẠC */
function playMusic(){
    document.getElementById("bgMusic").play();
}

/* 🎵 Auto phát khi click lần đầu */
document.body.addEventListener("click", function(){
    document.getElementById("bgMusic").play();
}, { once: true });
</script>

</body>
</html>
